{% extends 'base/base.html' %}
{% block title %}{{ action }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto space-y-6">
  <div>
    <p class="text-sm text-gray-500 mb-1">
      <a href="/cursos/{{ course.id }}/" class="hover:text-edu-primary">← {{ course.name }}</a>
    </p>
    <h1 class="text-2xl font-bold text-gray-900">{{ action }}</h1>
  </div>

  <form method="post" class="bg-white rounded-2xl shadow-sm p-6 space-y-5">
    {% csrf_token %}
    {% for field in form %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}
      <p class="mt-1 text-xs text-red-500">{{ field.errors|join:", " }}</p>
      {% endif %}
    </div>
    {% endfor %}
    <div class="flex justify-end space-x-3 pt-2">
      <a href="/cursos/{{ course.id }}/"
         class="px-4 py-2 text-sm border border-gray-300 rounded-lg hover:bg-gray-50 transition">Cancelar</a>
      <button type="submit"
              class="px-4 py-2 text-sm bg-edu-primary text-white rounded-lg hover:bg-edu-secondary transition">
        Guardar
      </button>
    </div>
  </form>
</div>
{% endblock %}
